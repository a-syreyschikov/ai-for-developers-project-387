services:
  backend:
    build:
      context: ./apps/backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./apps/frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
